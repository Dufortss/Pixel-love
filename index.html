<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start</title>
  <style>
    /*
      =========================================================
      CARTÃO DE AMOR PIXEL ART
      ---------------------------------------------------------
      Arquivos esperados na mesma pasta deste HTML:
      - dc91fc10-0d72-42db-88e0-a29e5de255ae.png  -> imagem/avatar do canto inferior
      - ff974043-4c11-4b8e-9157-dcb5d92f987b.png  -> fundo estrelado
      - 21154406-ffdf-48eb-9b12-1dd68dfe5d06.png  -> botão START
      - 8a403cfa-9e52-4457-920d-46c326f7a606.png  -> coração pixel art

      Observação:
      A imagem bca33905-0225-460c-b768-c3958cf4ef68.png foi enviada junto,
      mas não foi necessária nesta composição principal.
      =========================================================
    */

    :root {
      --bg-dark: #040312;
      --bg-space: #09051d;
      --pink: #ff4fd8;
      --hot-pink: #ff008c;
      --purple: #7f3dff;
      --cyan: #00ffe7;
      --white: #ffffff;
      --soft-white: rgba(255,255,255,0.88);
      --shadow-neon: 0 0 12px rgba(255, 0, 140, 0.65),
                     0 0 26px rgba(255, 0, 140, 0.55),
                     0 0 48px rgba(127, 61, 255, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      position: relative;
      color: var(--white);
    }

    /* Fundo principal com a imagem estrelada + camadas extras para dar profundidade */
    .scene {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(128, 86, 255, 0.16), transparent 35%),
        radial-gradient(circle at 20% 20%, rgba(0, 255, 231, 0.08), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(255, 0, 140, 0.10), transparent 25%),
        url('./starfall-gif-20.gif') center center / cover no-repeat;
      filter: saturate(1.08) contrast(1.04);
    }

    /* Camada escura para leitura melhor do texto e foco na animação */
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(2,2,10,0.18), rgba(2,2,10,0.42) 55%, rgba(2,2,10,0.68));
      pointer-events: none;
    }

    /* Fundo alternativo que entra quando o coração termina a descida */
    .scene.space-mode {
      background:
        radial-gradient(circle at 50% 35%, rgba(128, 86, 255, 0.16), transparent 35%),
        radial-gradient(circle at 20% 20%, rgba(0, 255, 231, 0.08), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(255, 0, 140, 0.10), transparent 25%),
        url('./44613062079901.5e703d2cf3c89.gif') center center / cover no-repeat;
      transition: background 1.1s ease;
    }

    /* Pequenas partículas brilhantes por cima do fundo */
    .sparkles,
    .sparkles::before,
    .sparkles::after {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.95) 0 1px, transparent 1.2px),
        radial-gradient(circle, rgba(255,79,216,0.85) 0 1px, transparent 1.2px),
        radial-gradient(circle, rgba(0,255,231,0.8) 0 1px, transparent 1.2px);
      background-size: 180px 180px, 240px 240px, 320px 320px;
      background-position: 10px 20px, 50px 90px, 100px 140px;
      animation: drift 18s linear infinite;
      opacity: 0.45;
    }

    .sparkles::before {
      animation-duration: 26s;
      opacity: 0.3;
      transform: scale(1.1);
    }

    .sparkles::after {
      animation-duration: 34s;
      opacity: 0.22;
      transform: scale(1.2);
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(40px); }
    }

    /* Container central de toda a experiência */
    .experience {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .card-stage {
      position: relative;
      width: min(88vw, 900px);
      height: min(72vh, 560px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Wrapper do botão START antes da transição */
    .start-wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: opacity 0.6s ease, transform 0.8s ease;
      z-index: 5;
    }

    .start-label {
      color: rgba(255,255,255,0.9);
      font-size: clamp(12px, 1.3vw, 16px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255,255,255,0.35);
      opacity: 0.86;
    }

    /* Botão visual usando a imagem START */
    .start-btn {
      appearance: none;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.25s ease;
    }

    .start-btn:hover {
      transform: translateY(-4px) scale(1.03);
    }

    .start-btn img {
      width: min(62vw, 520px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter:
        drop-shadow(0 0 8px rgba(0,255,231,0.25))
        drop-shadow(0 0 18px rgba(0,255,231,0.18));
      user-select: none;
      pointer-events: none;
      display: block;
    }

    /* Camada neon que acende quando clica no START */
    .start-glow {
      position: absolute;
      inset: -12px;
      border-radius: 30px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.35), transparent 45%),
        radial-gradient(circle, rgba(0,255,231,0.30), transparent 60%);
      filter: blur(10px);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .start-wrapper.activated .start-glow {
      opacity: 1;
      animation: pulseGlow 0.75s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      from { transform: scale(0.98); }
      to   { transform: scale(1.04); }
    }

    /* Coração principal que surge no lugar do START */
    .heart-journey {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%) scale(0.3);
      opacity: 0;
      z-index: 6;
      pointer-events: none;
      will-change: transform, opacity, filter;
    }

    .heart-journey img {
      width: clamp(96px, 16vw, 170px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      filter:
        drop-shadow(0 0 12px rgba(255, 70, 140, 0.95))
        drop-shadow(0 0 26px rgba(255, 0, 120, 0.75))
        drop-shadow(0 0 42px rgba(255, 0, 98, 0.55));
    }

    .heart-aura {
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,0,120,0.28), transparent 70%);
      filter: blur(14px);
      z-index: -1;
      animation: auraPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes auraPulse {
      from { transform: scale(0.92); opacity: 0.55; }
      to   { transform: scale(1.08); opacity: 0.85; }
    }

    /* Trilha do coração para simular velocidade/anos-luz */
    .heart-trail {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 0;
      border-radius: 999px;
      background: linear-gradient(to bottom, rgba(255, 70, 140, 0.85), rgba(255, 70, 140, 0));
      filter: blur(10px);
      opacity: 0;
      z-index: 4;
      pointer-events: none;
    }

    /* Mensagem final */
    .message-wrap {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%) scale(0.85);
      display: flex;
      align-items: center;
      gap: clamp(18px, 3vw, 34px);
      opacity: 0;
      z-index: 7;
      pointer-events: none;
      transition: opacity 1s ease, transform 1.2s ease;
      padding: 18px 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(8,8,30,0.18), rgba(255,255,255,0.05));
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .message-wrap.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .message-heart {
      position: relative;
      flex: 0 0 auto;
    }

    .message-heart img {
      width: clamp(92px, 14vw, 150px);
      image-rendering: pixelated;
      filter:
        drop-shadow(0 0 10px rgba(255, 0, 120, 0.85))
        drop-shadow(0 0 24px rgba(255, 0, 120, 0.55));
      animation: floatHeart 2.2s ease-in-out infinite;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .love-text {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .love-text .small {
      font-size: clamp(13px, 1.5vw, 16px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }

    .love-text h1 {
      font-size: clamp(34px, 7vw, 92px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow:
        0 0 10px rgba(255,255,255,0.7),
        0 0 20px rgba(255, 0, 132, 0.8),
        0 0 36px rgba(255, 0, 132, 0.55),
        0 0 60px rgba(127, 61, 255, 0.38);
    }

    .love-text p {
      color: var(--soft-white);
      font-size: clamp(14px, 1.8vw, 20px);
      max-width: 360px;
    }

    /* Avatar + GitHub no canto inferior */
    .signature {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      background: rgba(8, 10, 28, 0.54);
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .signature img.avatar {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      object-fit: cover;
      image-rendering: pixelated;
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.22);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .signature-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .signature-info span {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .github-link:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .github-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Classe que esconde o botão após a animação começar */
    .start-wrapper.fade-out {
      opacity: 0;
      transform: translate(-50%, -56%) scale(0.92);
      pointer-events: none;
    }

    /* Animação principal do coração:
       1) nasce no START
       2) brilha
       3) dispara como se estivesse viajando anos-luz
       4) desce e se posiciona na cena final
    */
    .heart-journey.play {
      animation: heartTravel 4.8s cubic-bezier(0.18, 0.88, 0.22, 1) forwards;
      opacity: 1;
    }

    .heart-trail.play {
      animation: trailTravel 4.8s cubic-bezier(0.18, 0.88, 0.22, 1) forwards;
      opacity: 1;
    }

    @keyframes heartTravel {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.28) rotate(0deg);
        filter: blur(0px);
      }
      10% {
        opacity: 1;
        transform: translate(-50%, -52%) scale(1.05) rotate(-2deg);
      }
      18% {
        transform: translate(-50%, -48%) scale(1.18) rotate(2deg);
      }
      34% {
        transform: translate(-50%, 5%) scale(0.96);
      }
      58% {
        transform: translate(-50%, 58%) scale(0.62);
        filter: blur(1px);
      }
      80% {
        opacity: 1;
        transform: translate(-50%, 94%) scale(0.88);
        filter: blur(0px);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, 94%) scale(0.95);
        filter: blur(0px);
      }
    }

    @keyframes trailTravel {
      0% {
        height: 0;
        opacity: 0;
        transform: translate(-50%, -50%) scaleY(1);
      }
      18% {
        height: 30px;
        opacity: 0.55;
      }
      30% {
        height: 150px;
        opacity: 0.95;
      }
      48% {
        height: 260px;
        opacity: 0.8;
      }
      68% {
        height: 160px;
        opacity: 0.45;
      }
      100% {
        height: 0;
        opacity: 0;
        transform: translate(-160%, 94%) scaleY(0.5);
      }
    }

    /* Efeito de flash leve no ambiente quando a sequência inicia */
    .flash {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.34), transparent 50%);
      opacity: 0;
    }

    .flash.play {
      animation: sceneFlash 0.8s ease-out forwards;
    }

    @keyframes sceneFlash {
      0% { opacity: 0; }
      18% { opacity: 0.85; }
      100% { opacity: 0; }
    }

    /* Responsividade */
    @media (max-width: 760px) {
      .message-wrap {
        flex-direction: column;
        text-align: center;
        padding: 18px;
      }

      .love-text p {
        max-width: 100%;
      }

      .signature {
        right: 10px;
        bottom: 10px;
        transform: scale(0.92);
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <!-- Fundo -->
  <div class="scene" id="scene"></div>
  <div class="sparkles"></div>

  <!-- Flash da transição -->
  <div class="flash" id="flash"></div>

  <main class="experience">
    <section class="card-stage">
      <!-- Tela inicial com o START -->
      <div class="start-wrapper" id="startWrapper">
        <span class="start-label">Toque para começar</span>

        <button class="start-btn" id="startBtn" aria-label="Iniciar animação de amor">
          <span class="start-glow"></span>
          <img src="./21154406-ffdf-48eb-9b12-1dd68dfe5d06.png" alt="Botão pixel art escrito START" />
        </button>
      </div>

      <!-- Coração viajando pela cena -->
      <div class="heart-trail" id="heartTrail"></div>

      <div class="heart-journey" id="heartJourney" aria-hidden="true">
        <span class="heart-aura"></span>
        <img src="./bca33905-0225-460c-b768-c3958cf4ef68.png" alt="Coração pixel art vermelho" />
      </div>

      <!-- Mensagem final -->
      <div class="message-wrap" id="messageWrap">
        <div class="message-heart">
          <img src="./bca33905-0225-460c-b768-c3958cf4ef68.png" alt="Coração pixel art" />
        </div>

        <div class="love-text">
          <span class="small"></span>
          <h1>Eu te Amo</h1>
          <img src="./garota-anime-com-olhos-verdes-apontando-para-algo-generativo-ai_958124-41653.png" alt="Imagem" style="width: 160%;"
/>
        </div>
      </div>
    </section>
  </main>

  <!-- Assinatura com sua imagem + link do GitHub -->
  <aside class="signature">
    <img
      class="avatar"
      src="./8a403cfa-9e52-4457-920d-46c326f7a606.png"
      alt="Avatar pixel art"
    />

    <div class="signature-info">
      <span>Feito por</span>
      <a class="github-link" href="https://github.com/Dufortss" target="_blank" rel="noopener noreferrer">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8a8.001 8.001 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.55 7.55 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.001 8.001 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
        </svg>
        Dufortss
      </a>
    </div>
  </aside>

  <script>
    /*
      =========================================================
      LÓGICA DA ANIMAÇÃO
      ---------------------------------------------------------
      Fluxo:
      1) usuário clica no START
      2) o botão acende / brilha
      3) o botão some
      4) o coração aparece e faz a viagem animada
      5) a mensagem final "Eu te Amo" surge ao lado do coração
      =========================================================
    */

    const startBtn = document.getElementById('startBtn');
    const startWrapper = document.getElementById('startWrapper');
    const heartJourney = document.getElementById('heartJourney');
    const heartTrail = document.getElementById('heartTrail');
    const messageWrap = document.getElementById('messageWrap');
    const flash = document.getElementById('flash');
    const scene = document.getElementById('scene');

    let hasStarted = false;

    startBtn.addEventListener('click', () => {
      // Evita disparar a animação mais de uma vez.
      if (hasStarted) return;
      hasStarted = true;

      // Liga o brilho do botão START imediatamente.
      startWrapper.classList.add('activated');
      flash.classList.add('play');

      // Pequeno atraso para o usuário perceber o brilho antes da transição.
      setTimeout(() => {
        // Some com o botão.
        startWrapper.classList.add('fade-out');

        // Inicia a viagem do coração e a trilha luminosa.
        heartJourney.classList.add('play');
        heartTrail.classList.add('play');
      }, 550);

      // Quando o coração alcança a parte de baixo, trocamos o fundo.
      setTimeout(() => {
        scene.classList.add('space-mode');
      }, 2600);

      // Depois da viagem, exibe a mensagem final.
      setTimeout(() => {
        messageWrap.classList.add('show');
      }, 4550);
    });

    /*
      Dica de personalização rápida:
      - Quer trocar a frase? altere o conteúdo do <h1>.
      - Quer mudar o tempo da animação? ajuste os setTimeouts acima
        e também a duração das animações em CSS (4.8s).
      - Quer deixar mais romântico? adicione música de fundo via <audio>.
    */
  </script>
</body>
</html>
